name: Release launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Display version shown in the launcher, for example 0.0.0.4"
        required: true
        type: string
      release_tag:
        description: "Optional unique GitHub release tag. Empty = launcher-<run_number>"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="${{ inputs.release_tag }}"
            if [ -z "$tag" ]; then
              tag="launcher-${GITHUB_RUN_NUMBER}"
            fi
          fi
          version="${version#v}"
          tag="${tag#refs/tags/}"
          if [ -z "$version" ]; then
            echo "Display version is empty" >&2
            exit 1
          fi
          if [ -z "$tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-2025
          - platform: linux-x64
            os: ubuntu-24.04
          - platform: macos-arm64
            os: macos-15
          - platform: macos-x64
            os: macos-15-intel

    runs-on: ${{ matrix.os }}
    env:
      APP_VERSION: ${{ needs.resolve.outputs.version }}
      RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
      BEBRALAND_BUILD_VERSION: ${{ needs.resolve.outputs.version }}
      BEBRALAND_UPDATE_ID: ${{ github.run_number }}
      BEBRALAND_COMPAT_VERSION: 9999.${{ github.run_number }}
      BEBRALAND_RELEASE_PLATFORM: ${{ matrix.platform }}
      BEBRALAND_SERVER_URL: ${{ secrets.BEBRALAND_SERVER_URL }}
      BEBRALAND_REQUIRE_SERVER_URL: "1"
      BEBRALAND_UPDATE_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows launcher
        if: runner.os == 'Windows'
        shell: cmd
        run: build_frontend.bat

      - name: Build Unix launcher
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x build_frontend.sh
          ./build_frontend.sh

      - name: Stage Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist\BebraLandLauncher.exe" "release\BebraLandLauncher-${env:BEBRALAND_RELEASE_PLATFORM}.exe"
          Copy-Item "dist\BebraLandUpdater.exe" "release\BebraLandUpdater-${env:BEBRALAND_RELEASE_PLATFORM}.exe"
          uv run python scripts\make_release_manifest.py `
            --version "$env:APP_VERSION" `
            --repo "${{ github.repository }}" `
            --tag "$env:RELEASE_TAG" `
            --update-id "$env:BEBRALAND_UPDATE_ID" `
            --compat-version "$env:BEBRALAND_COMPAT_VERSION" `
            --platform "$env:BEBRALAND_RELEASE_PLATFORM" `
            --artifact "release\BebraLandLauncher-${env:BEBRALAND_RELEASE_PLATFORM}.exe" `
            --output "release\latest-${env:BEBRALAND_RELEASE_PLATFORM}.json"

      - name: Stage Unix artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp dist/BebraLandLauncher "release/BebraLandLauncher-${BEBRALAND_RELEASE_PLATFORM}"
          cp dist/BebraLandUpdater "release/BebraLandUpdater-${BEBRALAND_RELEASE_PLATFORM}"
          chmod +x "release/BebraLandLauncher-${BEBRALAND_RELEASE_PLATFORM}" "release/BebraLandUpdater-${BEBRALAND_RELEASE_PLATFORM}"
          uv run python scripts/make_release_manifest.py \
            --version "$APP_VERSION" \
            --repo "${{ github.repository }}" \
            --tag "$RELEASE_TAG" \
            --update-id "$BEBRALAND_UPDATE_ID" \
            --compat-version "$BEBRALAND_COMPAT_VERSION" \
            --platform "$BEBRALAND_RELEASE_PLATFORM" \
            --artifact "release/BebraLandLauncher-${BEBRALAND_RELEASE_PLATFORM}" \
            --output "release/latest-${BEBRALAND_RELEASE_PLATFORM}.json"

      - name: Build Windows setup.exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
          $isccPath = if ($iscc) { $iscc.Source } else { "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path -LiteralPath $isccPath)) {
            throw "ISCC.exe not found: $isccPath"
          }
          & $isccPath "installer\BebraLandLauncher.iss"
          Copy-Item "dist\setup.exe" "release\setup-windows-x64.exe"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*

  publish:
    needs:
      - resolve
      - build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Merge update manifests
        shell: bash
        run: |
          uv run python scripts/merge_release_manifests.py \
            --output release-artifacts/latest.json \
            release-artifacts/latest-*.json
          rm release-artifacts/latest-*.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: BebraLand Launcher ${{ needs.resolve.outputs.version }}
          files: release-artifacts/*

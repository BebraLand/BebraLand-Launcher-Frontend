name: Release launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          $version = $version.Trim()
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if (-not $version) {
            throw "Release version is empty"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BEBRALAND_BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BEBRALAND_UPDATE_MANIFEST_URL=https://github.com/${{ github.repository }}/releases/latest/download/latest.json" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build EXE
        shell: cmd
        run: build_frontend.bat

      - name: Create update manifest
        shell: pwsh
        run: |
          uv run python scripts\make_release_manifest.py `
            --version "$env:APP_VERSION" `
            --repo "${{ github.repository }}" `
            --tag "$env:RELEASE_TAG" `
            --exe "dist\BebraLandLauncher.exe" `
            --output "dist\latest.json"

      - name: Build setup.exe
        shell: pwsh
        run: |
          $iscc = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
          $isccPath = if ($iscc) { $iscc.Source } else { "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path -LiteralPath $isccPath)) {
            throw "ISCC.exe not found: $isccPath"
          }
          & $isccPath "installer\BebraLandLauncher.iss"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BebraLand Launcher ${{ env.APP_VERSION }}
          files: |
            dist/setup.exe
            dist/BebraLandLauncher.exe
            dist/BebraLandUpdater.exe
            dist/latest.json
